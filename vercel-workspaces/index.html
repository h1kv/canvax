<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome</title>
  <style>
    :root {
      --bg-start: #eef2ff;
      --bg-end: #f8fafc;
      --card-bg: rgba(255, 255, 255, 0.86);
      --text: #172033;
      --muted: #5d6b82;
      --accent: #4f46e5;
      --accent-soft: #e0e7ff;
      --shadow: 0 24px 60px rgba(31, 41, 55, 0.14);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(79, 70, 229, 0.18), transparent 34rem),
        linear-gradient(135deg, var(--bg-start), var(--bg-end));
      display: grid;
      place-items: center;
      padding: 2rem;
    }

    main {
      width: min(100%, 720px);
      text-align: center;
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: clamp(2.5rem, 7vw, 5rem);
      backdrop-filter: blur(14px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
      padding: 0.45rem 0.8rem;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 0.5rem;
      height: 0.5rem;
      border-radius: 50%;
      background: currentColor;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      line-height: 1;
      letter-spacing: -0.06em;
      margin-bottom: 1rem;
    }

    p {
      max-width: 38rem;
      margin: 0 auto;
      color: var(--muted);
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      line-height: 1.7;
    }

    @media (max-width: 520px) {
      body {
        padding: 1rem;
      }

      main {
        border-radius: 22px;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">One Page Website</div>
    <h1>Welcome</h1>
    <p>Thanks for stopping by. This simple static page is clean, responsive, and ready to share with the world.</p>
  </main>
</body>
</html>
