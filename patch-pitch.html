<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DISPATCH.AI Pitch Deck</title>
  <style>
    :root {
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: #242424;
      background: #ffffff;
      font-size: 14px;
      line-height: 1.4;
      font-synthesis: none;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      --green: #1f6f52;
      --green-dark: #163d2e;
      --border: #dedede;
      --muted: #666666;
      --panel: #f4f4f4;
      --soft: #fafafa;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      background: #ffffff;
    }

    button {
      font: inherit;
      color: inherit;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .deck {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      width: 100%;
      height: 100dvh;
      overflow: hidden;
    }

    .sidebar {
      display: none;
      flex-direction: column;
      min-width: 0;
      background: var(--panel);
      border-right: 1px solid #d8d8d8;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 64px;
      padding: 0 18px;
      border-bottom: 1px solid #d8d8d8;
    }

    .mark {
      display: grid;
      grid-template-columns: repeat(2, 8px);
      gap: 3px;
      flex: 0 0 auto;
    }

    .mark span {
      width: 8px;
      height: 8px;
      background: var(--green);
    }

    .mark span:nth-child(2),
    .mark span:nth-child(3) { opacity: 0.58; }
    .mark span:nth-child(4) { opacity: 0.28; }

    .brand strong {
      display: block;
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    .brand em {
      display: block;
      margin-top: 2px;
      color: #767676;
      font-size: 12px;
      font-style: normal;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 12px;
      overflow: auto;
    }

    .nav button {
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      width: 100%;
      min-height: 38px;
      padding: 8px 9px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: #5f5f5f;
      text-align: left;
      font-size: 13px;
    }

    .nav button span {
      color: #9a9a9a;
      font-variant-numeric: tabular-nums;
    }

    .nav button:hover {
      background: #e9e9e9;
      color: #303030;
    }

    .nav button.active {
      background: #dfe9e4;
      color: var(--green-dark);
      font-weight: 600;
    }

    .nav button.active span {
      color: var(--green);
    }

    .side-foot {
      display: flex;
      justify-content: space-between;
      margin-top: auto;
      padding: 12px 16px;
      border-top: 1px solid #d8d8d8;
      color: #767676;
      font-size: 12px;
    }

    .stage {
      display: grid;
      grid-template-rows: 56px minmax(0, 1fr) auto;
      min-width: 0;
      min-height: 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 0 28px;
      border-bottom: 1px solid #e3e3e3;
      color: #555555;
    }

    .topbar strong {
      flex: 0 0 auto;
      font-size: 13px;
      font-weight: 600;
    }

    .progress {
      width: 100%;
      height: 3px;
      background: #ececec;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0;
      background: var(--green);
      transition: width 160ms ease;
    }

    .slide {
      align-self: center;
      width: min(920px, calc(100% - 72px));
      margin: 0 auto;
      padding: 32px 0 40px;
    }

    body.title-mode .stage {
      grid-template-rows: minmax(0, 1fr);
    }

    body.title-mode .topbar,
    body.title-mode .footer {
      display: none;
    }

    .slide.title-slide {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 100dvh;
      padding: 48px 28px;
      text-align: center;
    }

    .logo {
      display: none;
      width: 112px;
      height: 112px;
      margin-bottom: 34px;
    }

    .title-slide .logo {
      display: block;
    }

    .title-slide .kicker {
      display: none !important;
    }

    .title-slide h1 {
      font-size: clamp(48px, 8vw, 96px);
      letter-spacing: 0.08em;
      line-height: 1;
    }

    .title-slide .body {
      max-width: 850px;
      margin-top: 26px;
      color: #424242;
      font-size: clamp(19px, 2.2vw, 28px);
      line-height: 1.35;
    }

    .title-slide .points {
      display: none;
    }

    .title-hint {
      display: none;
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      color: #888888;
      font-size: 13px;
    }

    body.title-mode .title-hint {
      display: block;
    }

    .kicker {
      margin: 0 0 18px;
      color: var(--green);
      font-size: 18px;
      font-weight: 600;
    }

    h1 {
      max-width: 860px;
      margin: 0;
      color: #171717;
      font-size: clamp(42px, 6vw, 76px);
      line-height: 0.98;
      letter-spacing: 0;
    }

    .body {
      max-width: 760px;
      margin: 26px 0 0;
      color: #4f4f4f;
      font-size: clamp(18px, 2.2vw, 24px);
      line-height: 1.45;
    }

    .points {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      max-width: 860px;
      margin: 34px 0 0;
      padding: 0;
      list-style: none;
    }

    .points li {
      min-height: 56px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--soft);
      color: #2f2f2f;
      font-size: 15px;
    }

    .diagram {
      display: none;
      margin-top: 34px;
    }

    .diagram.active {
      display: block;
    }

    .compare-diagram {
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
      gap: 18px;
      max-width: 980px;
    }

    .diagram-panel {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fbfbfb;
      padding: 18px;
    }

    .diagram-panel h2 {
      margin: 0 0 16px;
      color: #222222;
      font-size: 18px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .diagram-panel.bad h2 {
      color: #8a3a2a;
    }

    .diagram-panel.good h2 {
      color: var(--green-dark);
    }

    .chat-window {
      overflow: hidden;
      border: 1px solid #dadada;
      border-radius: 8px;
      background: #ffffff;
    }

    .chat-window-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 36px;
      padding: 0 12px;
      border-bottom: 1px solid #e5e5e5;
      background: #f7f7f7;
      color: #555555;
      font-size: 12px;
      font-weight: 600;
    }

    .chat-dots {
      display: flex;
      gap: 4px;
    }

    .chat-dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #cfcfcf;
    }

    .chat-thread {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 312px;
      padding: 14px;
    }

    .bubble {
      max-width: 84%;
      padding: 10px 12px;
      border: 1px solid #dcdcdc;
      border-radius: 8px;
      color: #333333;
      font-size: 14px;
      line-height: 1.35;
    }

    .bubble.user {
      align-self: flex-end;
      background: #0078d4;
      border-color: #0078d4;
      color: #ffffff;
    }

    .bubble.assistant {
      align-self: flex-start;
      background: #f7f7f7;
    }

    .bubble.warning {
      align-self: center;
      max-width: 92%;
      background: #fff7f4;
      border-color: #e7c6ba;
      color: #8a3a2a;
      font-weight: 600;
      text-align: center;
    }

    .chat-input {
      margin: 0 14px 14px;
      padding: 10px 12px;
      border: 1px solid #d6d6d6;
      border-radius: 7px;
      color: #8a8a8a;
      font-size: 13px;
    }

    .dispatch-mock {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 138px;
      min-height: 374px;
      overflow: hidden;
      border: 1px solid #dadada;
      border-radius: 8px;
      background: #ffffff;
    }

    .dispatch-canvas {
      position: relative;
      min-height: 374px;
      background-image: radial-gradient(circle, #d3d3d3 1px, transparent 1px);
      background-size: 22px 22px;
      border-right: 1px solid #e2e2e2;
    }

    .canvas-node {
      position: absolute;
      left: 50%;
      width: 132px;
      height: 50px;
      transform: translateX(-50%);
      overflow: hidden;
      border: 1px solid #cfcfcf;
      border-radius: 5px;
      background: #ffffff;
      font-size: 11px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
    }

    .canvas-node b {
      display: block;
      height: 17px;
      padding: 3px 7px;
      color: #ffffff;
      font-size: 9px;
      line-height: 1;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .canvas-node span {
      display: block;
      padding: 8px 7px 0;
      color: #333333;
      font-weight: 600;
    }

    .canvas-node.init { top: 26px; }
    .canvas-node.investigate { top: 86px; }
    .canvas-node.plan { top: 146px; }
    .canvas-node.create { top: 206px; }
    .canvas-node.evaluate { top: 266px; }

    .canvas-node.init b { background: #16825d; }
    .canvas-node.investigate b { background: #2d6a9f; }
    .canvas-node.plan b { background: #5a3e8c; }
    .canvas-node.create b { background: #8c3e1a; }
    .canvas-node.evaluate b { background: #7a3f3f; }

    .canvas-lines {
      position: absolute;
      left: calc(50% - 1px);
      top: 76px;
      width: 2px;
      height: 240px;
      background: #8b8b8b;
    }

    .canvas-lines::before,
    .canvas-lines::after {
      content: "";
      position: absolute;
      left: -3px;
      width: 8px;
      height: 8px;
      border: 2px solid #8b8b8b;
      border-radius: 50%;
      background: #ffffff;
    }

    .canvas-lines::before { top: -4px; }
    .canvas-lines::after { bottom: -4px; }

    .dispatch-side {
      display: flex;
      flex-direction: column;
      background: #f5f5f5;
    }

    .dispatch-side-head {
      height: 36px;
      padding: 10px 12px;
      border-bottom: 1px solid #dedede;
      color: #444444;
      font-size: 12px;
      font-weight: 600;
    }

    .dispatch-chat {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
    }

    .mini-bubble {
      padding: 8px 9px;
      border-radius: 7px;
      font-size: 11px;
      line-height: 1.3;
    }

    .mini-bubble.user {
      margin-left: 12px;
      background: #0078d4;
      color: #ffffff;
    }

    .mini-bubble.assistant {
      margin-right: 8px;
      border: 1px solid #d9d9d9;
      background: #ffffff;
      color: #333333;
    }

    .dispatch-status {
      margin: auto 12px 12px;
      padding: 8px;
      border: 1px solid #c8dcd2;
      border-radius: 6px;
      background: #f4faf6;
      color: var(--green-dark);
      font-size: 11px;
      font-weight: 600;
    }

    .diagram-caption {
      margin: 14px 0 0;
      color: #666666;
      font-size: 13px;
      line-height: 1.4;
    }

    .footer {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: end;
      padding: 18px 28px;
      border-top: 1px solid #e3e3e3;
      background: #fbfbfb;
    }

    .note {
      max-width: 820px;
    }

    .note strong {
      display: block;
      margin-bottom: 4px;
      color: #333333;
      font-size: 12px;
    }

    .note p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .controls {
      display: flex;
      gap: 8px;
    }

    .controls button {
      min-width: 88px;
      height: 34px;
      padding: 0 12px;
      border: 1px solid #cfcfcf;
      border-radius: 6px;
      background: #ffffff;
      color: #333333;
      font-weight: 600;
    }

    .controls button:hover:not(:disabled) {
      border-color: var(--green);
      color: var(--green-dark);
    }

    .controls button:last-child {
      border-color: var(--green);
      background: var(--green);
      color: #ffffff;
    }

    .controls button:last-child:hover:not(:disabled) {
      background: #195b43;
    }

    @media (max-width: 820px) {
      .stage {
        grid-template-rows: 48px minmax(0, 1fr) auto;
      }

      .topbar {
        padding: 0 16px;
      }

      .slide {
        width: calc(100% - 32px);
        padding: 24px 0;
      }

      .points {
        grid-template-columns: 1fr;
      }

      .compare-diagram {
        grid-template-columns: 1fr;
      }

      .dispatch-mock {
        grid-template-columns: 1fr;
      }

      .dispatch-side {
        display: none;
      }

      .footer {
        grid-template-columns: 1fr;
        padding: 14px 16px;
      }

      .logo {
        width: 88px;
        height: 88px;
      }
    }
  </style>
</head>
<body>
  <main class="deck">
    <aside class="sidebar" aria-label="Pitch slides">
      <div class="brand">
        <span class="mark" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </span>
        <div>
          <strong>DISPATCH.AI</strong>
          <em>Pitch deck</em>
        </div>
      </div>
      <nav class="nav" id="slideNav"></nav>
      <div class="side-foot">
        <span id="slideCount">1 / 8</span>
        <span id="slideProgressText">13%</span>
      </div>
    </aside>

    <section class="stage" aria-live="polite">
      <header class="topbar">
        <strong>Local pitch deck</strong>
        <div class="progress" aria-label="Slide progress">
          <span id="slideProgress"></span>
        </div>
      </header>

      <article class="slide">
        <svg class="logo" viewBox="0 0 14 14" fill="none" aria-hidden="true">
          <rect x="1" y="1" width="5" height="5" rx="1.2" fill="#0078d4" opacity="0.9"></rect>
          <rect x="8" y="1" width="5" height="5" rx="1.2" fill="#0078d4" opacity="0.55"></rect>
          <rect x="1" y="8" width="5" height="5" rx="1.2" fill="#0078d4" opacity="0.55"></rect>
          <rect x="8" y="8" width="5" height="5" rx="1.2" fill="#0078d4" opacity="0.28"></rect>
        </svg>
        <p class="kicker" id="kicker"></p>
        <h1 id="title"></h1>
        <p class="body" id="body"></p>
        <ul class="points" id="points"></ul>
        <div class="diagram" id="diagram"></div>
        <p class="title-hint">Press → to continue</p>
      </article>

      <footer class="footer">
        <div class="note">
          <strong>Presenter note</strong>
          <p id="note"></p>
        </div>
        <div class="controls">
          <button type="button" id="prev">Previous</button>
          <button type="button" id="next">Next</button>
        </div>
      </footer>
    </section>
  </main>

  <script>
    const slides = [
      {
        title: "DISPATCH.AI",
        body: "The visual agent platform - redefining agentic orchestration through visual control.",
        points: [],
        note: "Open with the name, pause, then say the motto exactly. The first slide is intentionally simple."
      },
      {
        title: "Phase-2 based agentic chatting just sucks.",
        body: "",
        points: [],
        diagram: "prompting",
        note: "Use this slide to explain the behavioral shift: the prompt should create an inspectable chain, not a disappearing answer."
      },
      {
        title: "Make agents visual",
        body: "DISPATCH turns a request into a graph of typed agents. Each node has a job, each edge shows data flow, and each run records what happened.",
        points: [
          "Initialiser captures the goal and workspace",
          "Investigate, Plan, Design, Create, Evaluate, and Materialize split the work",
          "Review nodes add human approval gates",
          "The terminal panel shows runtime progress and errors"
        ],
        note: "Point at the graph. The canvas is not decoration; it is the execution model."
      },
      {
        title: "Example: build a website from intent",
        body: "The user can say: make a better website from this URL. DISPATCH proposes a chain, previews the graph, runs the agents, evaluates the result, and writes files when the output is safe.",
        points: [
          "Chat proposes typed canvas operations",
          "The graph can be inspected before applying",
          "Each node output is visible",
          "Materialize only writes valid file-map artifacts"
        ],
        note: "This is where you show the example. Keep it simple: request, graph, run logs, output or preview."
      },
      {
        title: "Built for control and trust",
        body: "The platform is designed around practical software workflow controls: review gates, retry from failed nodes, safe file writes, evidence tracking, and persistent workspace state.",
        points: [
          "Run ledger tracks facts, gaps, outputs, and evaluation issues",
          "Safe writes block invalid or missing file outputs",
          "Retry can start from the failed node instead of rerunning everything",
          "Chat memory and workspace state persist across sessions"
        ],
        note: "This answers why a developer would trust this more than a normal AI chat."
      },
      {
        title: "Who it is for",
        body: "DISPATCH is for developers, makers, agencies, and technical teams who want AI agents to produce real work without losing visibility.",
        points: [
          "Developers building features or debugging code",
          "Agencies generating websites, audits, and client deliverables",
          "Founders turning rough ideas into working prototypes",
          "Teams that need human review before AI writes files"
        ],
        note: "Say this is not another chatbot. It is for people who need AI in actual workflows."
      },
      {
        title: "Why it is different",
        body: "Most AI products optimize the answer. DISPATCH optimizes the workflow around the answer.",
        points: [
          "Visual graph instead of hidden reasoning",
          "Typed nodes instead of one generic assistant",
          "Runtime terminal instead of silent failures",
          "Human review and safe materialization built in"
        ],
        note: "The strongest one-liner: we are giving users an operating system for agent work."
      },
      {
        title: "What comes next",
        body: "The next milestone is making artifacts first-class: Create stores the file output, Evaluate returns a verdict, and Materialize writes the approved artifact.",
        points: [
          "First-class artifact store for generated files",
          "Stronger workspace memory and fact approval",
          "Hosted previews for generated sites",
          "Voice and conversation mode for live workflow control"
        ],
        note: "End with maturity. Acknowledge the current edge honestly: artifact handoff is the next major hardening step."
      }
    ];

    let index = 0;

    const nav = document.getElementById("slideNav");
    const title = document.getElementById("title");
    const kicker = document.getElementById("kicker");
    const body = document.getElementById("body");
    const points = document.getElementById("points");
    const diagram = document.getElementById("diagram");
    const note = document.getElementById("note");
    const count = document.getElementById("slideCount");
    const progress = document.getElementById("slideProgress");
    const progressText = document.getElementById("slideProgressText");
    const prev = document.getElementById("prev");
    const next = document.getElementById("next");

    function renderNav() {
      nav.innerHTML = "";
      slides.forEach((slide, slideIndex) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = slideIndex === index ? "active" : "";
        button.innerHTML = `<span>${String(slideIndex + 1).padStart(2, "0")}</span>${slide.title}`;
        button.addEventListener("click", () => {
          index = slideIndex;
          render();
        });
        nav.appendChild(button);
      });
    }

    function render() {
      const slide = slides[index];
      const pct = Math.round(((index + 1) / slides.length) * 100);
      document.body.classList.toggle("title-mode", index === 0);
      document.querySelector(".slide").classList.toggle("title-slide", index === 0);
      title.textContent = slide.title;
      kicker.textContent = slide.kicker || "";
      kicker.style.display = slide.kicker ? "block" : "none";
      body.textContent = slide.body;
      points.innerHTML = "";
      slide.points.forEach((point) => {
        const li = document.createElement("li");
        li.textContent = point;
        points.appendChild(li);
      });
      diagram.className = slide.diagram ? "diagram active" : "diagram";
      diagram.innerHTML = slide.diagram === "prompting" ? `
        <div class="compare-diagram">
          <section class="diagram-panel bad">
            <h2>Instead of prompting like this</h2>
            <div class="chat-window" aria-label="Normal chat loop diagram">
              <div class="chat-window-head">
                <span>Normal chat</span>
                <span class="chat-dots" aria-hidden="true"><span></span><span></span><span></span></span>
              </div>
              <div class="chat-thread">
                <div class="bubble user">Build me a website for this business.</div>
                <div class="bubble assistant">Sure. Here is a complete website idea with sections, copy, and code...</div>
                <div class="bubble user">Can you fix the layout and remember the research?</div>
                <div class="bubble assistant">I can try. Could you remind me what the business details were?</div>
                <div class="bubble warning">The process is hidden. The context drifts.</div>
              </div>
              <div class="chat-input">Prompt again...</div>
            </div>
            <p class="diagram-caption">The work happens inside a conversation, so you cannot see the chain of decisions or retry the exact failed step.</p>
          </section>

          <section class="diagram-panel good">
            <h2>You should prompt like this</h2>
            <div class="dispatch-mock" aria-label="DISPATCH visual workflow diagram">
              <div class="dispatch-canvas">
                <div class="canvas-lines" aria-hidden="true"></div>
                <div class="canvas-node init"><b>Initialiser</b><span>Start</span></div>
                <div class="canvas-node investigate"><b>Investigate</b><span>Research</span></div>
                <div class="canvas-node plan"><b>Plan</b><span>Structure</span></div>
                <div class="canvas-node create"><b>Create</b><span>Build files</span></div>
                <div class="canvas-node evaluate"><b>Evaluate</b><span>Review</span></div>
              </div>
              <div class="dispatch-side">
                <div class="dispatch-side-head">Copilot</div>
                <div class="dispatch-chat">
                  <div class="mini-bubble user">Make a better website from this business.</div>
                  <div class="mini-bubble assistant">I'll create a workflow and preview the graph before applying.</div>
                </div>
                <div class="dispatch-status">Visible chain ready</div>
              </div>
            </div>
            <p class="diagram-caption">The prompt becomes a visible workflow: inspect outputs, approve research, see errors, retry failed nodes, and write real files.</p>
          </section>
        </div>
      ` : "";
      note.textContent = slide.note;
      count.textContent = `${index + 1} / ${slides.length}`;
      progress.style.width = `${pct}%`;
      progressText.textContent = `${pct}%`;
      prev.disabled = index === 0;
      next.disabled = index === slides.length - 1;
      renderNav();
    }

    function go(delta) {
      index = Math.max(0, Math.min(slides.length - 1, index + delta));
      render();
    }

    prev.addEventListener("click", () => go(-1));
    next.addEventListener("click", () => go(1));

    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight" || event.key === "PageDown" || event.key === " ") {
        event.preventDefault();
        go(1);
      }
      if (event.key === "ArrowLeft" || event.key === "PageUp") {
        event.preventDefault();
        go(-1);
      }
      if (event.key === "Home") {
        index = 0;
        render();
      }
      if (event.key === "End") {
        index = slides.length - 1;
        render();
      }
    });

    window.addEventListener("contextmenu", (event) => {
      event.preventDefault();
      go(1);
    });

    render();
  </script>
</body>
</html>
